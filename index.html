<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Study Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📚 EduFlow</h1>
      <p>Organize your studies, track progress, and achieve your goals</p>
    </div>

    <div class="card">
      <div class="stats">
        <div class="stat">
          <div class="stat-number" id="totalTasks">0</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="completedTasks">0</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="progressPercent">0%</div>
          <div class="stat-label">Progress</div>
        </div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressBar" style="width: 0%"></div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">➕ Add New Task</h2>
      <form id="taskForm">
        <div class="form-group">
          <label>📝 Task Title</label>
          <input type="text" id="taskTitle" placeholder="Enter your study task" required />
        </div>

        <div class="form-group">
          <label>📚 Subject</label>
          <input type="text" id="taskSubject" placeholder="e.g., Mathematics" required />
        </div>

        <div class="form-group">
          <label>📅 Due Date & Time</label>
          <input type="datetime-local" id="taskDueDate" required />
        </div>

        <div class="form-group">
          <label>⚡ Priority Level</label>
          <select id="taskPriority">
            <option value="low">🟢 Low Priority</option>
            <option value="medium" selected>🟡 Medium Priority</option>
            <option value="high">🔴 High Priority</option>
          </select>
        </div>

        <button type="submit" class="btn">✨ Add Task</button>
      </form>
    </div>

    <div class="card">
      <h2 class="section-title">📋 My Study Tasks</h2>
      <div id="taskList">
        <div class="empty-state">
          <p>🎯 No tasks yet. Add your first study task above!</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
